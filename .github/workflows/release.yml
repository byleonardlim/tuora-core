name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

env:
  CARGO_TERM_COLOR: always

jobs:
  bump-version:
    name: Bump Version
    # Skip if triggered by tag push OR if this is an automated release commit
    if: |
      (github.event_name == 'workflow_dispatch' || 
       (github.event_name == 'push' && github.ref == 'refs/heads/main')) &&
      !startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already released
        id: check
        run: |
          # Check if last commit was already a release
          if git log -1 --pretty=%B | grep -q "^chore: release v"; then
            echo "Already released, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Bump version
        if: steps.check.outputs.skip != 'true'
        id: bump
        run: |
          CURRENT=$(grep '^version' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Current: $CURRENT"

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          BUMP="${{ github.event.inputs.bump }}"
          # Auto patch bump on main push if no bump specified
          if [ -z "$BUMP" ] || [ "$BUMP" = "none" ]; then
            BUMP="patch"
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

          # Update Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" core/Cargo.toml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add core/Cargo.toml
          git commit -m "chore: release v$NEW"
          git tag "v$NEW"

      - name: Push changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

  test:
    name: Quality Checks
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  build:
    name: Build ${{ matrix.target }}
    if: github.event_name != 'workflow_dispatch'
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-x86_64
            
          # Linux ARM64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-arm64
            use_cross: true
            
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-x86_64
            
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (native)
        if: '!matrix.use_cross'
        env:
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cargo build --release --target ${{ matrix.target }} -p tuora

      - name: Build (cross)
        if: matrix.use_cross
        env:
          CROSS_CONTAINER_OPTS: "-e TUORA_SIGNING_PUBKEY"
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cross build --release --target ${{ matrix.target }} -p tuora

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Calculate checksum
        run: |
          cd target/${{ matrix.target }}/release
          shasum -a 256 ${{ matrix.binary }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          ls -la release/

      - name: Create checksum file
        run: |
          cd release
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/tuora-*
            release/SHA256SUMS
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    name: Test Install Script
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test install.sh
        run: |
          # Set a custom install directory for testing
          export INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          
          # Run installer
          cat core/install.sh | sh
          
          # Verify installation
          "$INSTALL_DIR/tuora" --version

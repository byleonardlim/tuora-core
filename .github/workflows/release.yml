name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (none = redeploy previous tag)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

env:
  CARGO_TERM_COLOR: always

jobs:
  bump-version:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use PAT instead of GITHUB_TOKEN so tag push triggers workflows
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep 'version = "' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT"

          BUMP="${{ github.event.inputs.bump }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Bumped to: $NEW"

          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" core/Cargo.toml

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add core/Cargo.toml
          git commit -m "chore: release v$NEW"
          git push origin HEAD:${{ github.ref_name }}

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

          git tag "v$NEW"
          git push origin "v$NEW"

  # ─────────────────────────────────────────────
  # Resolve previous tag (when bump = none)
  # ─────────────────────────────────────────────
  resolve-version:
    name: Resolve Previous Tag
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump == 'none'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version tag
        id: tag
        run: |
          TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "Error: No previous v* tag found"
            exit 1
          fi
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Redeploying previous tag: $TAG"

  test:
    name: Quality Checks
    needs: [bump-version, resolve-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped') && (needs.resolve-version.result == 'success' || needs.resolve-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag || needs.resolve-version.outputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  build:
    name: Build ${{ matrix.target }}
    needs: [test, bump-version, resolve-version]
    if: always() && needs.test.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-x86_64
            
          # Linux ARM64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-arm64
            use_cross: true
            
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-x86_64
            
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag || needs.resolve-version.outputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 binutils (for Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build (native)
        if: '!matrix.use_cross'
        env:
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
          TUORA_LEDGER_URL: ${{ secrets.TUORA_LEDGER_URL }}
        run: cargo build --release --target ${{ matrix.target }} -p tuora

      - name: Build (cross)
        if: matrix.use_cross
        env:
          CROSS_CONTAINER_OPTS: "-e TUORA_SIGNING_PUBKEY -e TUORA_LEDGER_URL"
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
          TUORA_LEDGER_URL: ${{ secrets.TUORA_LEDGER_URL }}
        run: cross build --release --target ${{ matrix.target }} -p tuora

      - name: Strip binary
        run: |
          STRIP=strip
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            STRIP=aarch64-linux-gnu-strip
          fi
          $STRIP target/${{ matrix.target }}/release/${{ matrix.binary }}
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Calculate checksum
        run: |
          cd target/${{ matrix.target }}/release
          shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256

  release:
    name: Create Release
    needs: [build, bump-version, resolve-version]
    if: always() && needs.build.result == 'success' && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped') && (needs.resolve-version.result == 'success' || needs.resolve-version.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ needs.bump-version.outputs.tag }}" ]; then
            echo "name=${{ needs.bump-version.outputs.tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ needs.resolve-version.outputs.tag }}" ]; then
            echo "name=${{ needs.resolve-version.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version = "' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            TAG="v$VERSION"
            echo "name=$TAG" >> $GITHUB_OUTPUT
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag "$TAG" || echo "Tag $TAG already exists"
            git push origin "$TAG" || echo "Tag already pushed"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          ls -la release/

      - name: Create checksum file
        run: |
          cd release
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            release/tuora-*
            release/SHA256SUMS
          draft: false
          prerelease: ${{ startsWith(steps.tag.outputs.name, 'v0.') || contains(steps.tag.outputs.name, '-rc') || contains(steps.tag.outputs.name, '-beta') || contains(steps.tag.outputs.name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    name: Test Install Script
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test install.sh
        run: |
          export INSTALL_DIR="$HOME/.local/bin"
          export VERSION="${{ needs.release.outputs.tag }}"
          mkdir -p "$INSTALL_DIR"
          sh core/install.sh
          "$INSTALL_DIR/tuora" --version

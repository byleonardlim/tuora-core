name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-x86_64-unknown-linux-musl
            
          # Linux ARM64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-aarch64-unknown-linux-musl
            use_cross: true
            
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-x86_64-apple-darwin
            
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-aarch64-apple-darwin
            
          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: tuora.exe
            asset_name: tuora-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (native)
        if: '!matrix.use_cross'
        env:
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cargo build --release --target ${{ matrix.target }} -p tuora

      - name: Build (cross)
        if: matrix.use_cross
        env:
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cross build --release --target ${{ matrix.target }} -p tuora

      - name: Strip binary (Unix)
        if: '!contains(matrix.os, ''windows'')'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Calculate checksums
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            certutil -hashfile ${{ matrix.binary }} SHA256 | findstr /v "hash" > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.binary }} > ${{ matrix.asset_name }}.sha256
          fi
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          ls -la release/

      - name: Create checksum file
        run: |
          cd release
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/tuora-*
            release/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    name: Test Install Script
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test install.sh
        run: |
          # Set a custom install directory for testing
          export INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          
          # Run installer
          cat core/install.sh | sh
          
          # Verify installation
          "$INSTALL_DIR/tuora" --version

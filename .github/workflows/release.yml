name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      build_only:
        description: 'Skip bump, just build and release (for existing tag)'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  bump-version:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use PAT instead of GITHUB_TOKEN so tag push triggers workflows
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep 'version = "' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT"

          BUMP="${{ github.event.inputs.bump }}"

          if [ "$BUMP" = "none" ]; then
            # No bump - tag current version as-is
            NEW="$CURRENT"
            echo "No bump requested, using current version"
          else
            # Calculate new version
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)

            case "$BUMP" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW="$MAJOR.$MINOR.$PATCH"
            echo "Bumped to: $NEW"

            # Update Cargo.toml
            sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" core/Cargo.toml

            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add core/Cargo.toml
            git commit -m "chore: release v$NEW"
          fi

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

          # Create and push tag
          git tag "v$NEW" || echo "Tag v$NEW already exists"
          git push origin "v$NEW" || echo "Tag already pushed"

      - name: Push version bump commit
        if: github.event.inputs.bump != 'none'
        run: |
          git push origin main

  test:
    name: Quality Checks
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  build:
    name: Build ${{ matrix.target }}
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_only == 'true'
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-x86_64
            
          # Linux ARM64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: tuora
            asset_name: tuora-linux-arm64
            use_cross: true
            
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-x86_64
            
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tuora
            asset_name: tuora-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 binutils (for Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build (native)
        if: '!matrix.use_cross'
        env:
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cargo build --release --target ${{ matrix.target }} -p tuora

      - name: Build (cross)
        if: matrix.use_cross
        env:
          CROSS_CONTAINER_OPTS: "-e TUORA_SIGNING_PUBKEY"
          TUORA_SIGNING_PUBKEY: ${{ secrets.TUORA_SIGNING_PUBKEY }}
        run: cross build --release --target ${{ matrix.target }} -p tuora

      - name: Strip binary
        run: |
          STRIP=strip
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            STRIP=aarch64-linux-gnu-strip
          fi
          $STRIP target/${{ matrix.target }}/release/${{ matrix.binary }}
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Calculate checksum
        run: |
          cd target/${{ matrix.target }}/release
          shasum -a 256 ${{ matrix.binary }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version = "' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            TAG="v$VERSION"
            echo "name=$TAG" >> $GITHUB_OUTPUT
            git tag "$TAG" || echo "Tag $TAG already exists"
            git push origin "$TAG" || echo "Tag already pushed"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "${dir}"* release/
          done
          ls -la release/

      - name: Create checksum file
        run: |
          cd release
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            release/tuora-*
            release/SHA256SUMS
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    name: Test Install Script
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test install.sh
        run: |
          # Set a custom install directory for testing
          export INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          
          # Run installer
          cat core/install.sh | sh
          
          # Verify installation
          "$INSTALL_DIR/tuora" --version

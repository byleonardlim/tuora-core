name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-core:
    name: Test Core (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p tuora
      - run: cargo test -p tuora-types
      - run: cargo clippy -p tuora -- -D warnings
      - run: cargo fmt --check -p tuora
